<!DOCTYPE html>
<html>

<head>
  <title>Your Giga Pet Game</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="flash-overlay"></div>
  
  <!-- INTRO SCREEN -->
  <div id="intro-screen">
    <div class="title-box">
      <h1>Welcome to Giga Pet!</h1>
    </div>
    <input type="text" id="pet-name-input" placeholder="Enter your pet's name">
    <button id="start-game">Start Game</button>
  </div>

  <!-- MAIN GAME -->
  <div id="game" style="display:none;">

    <header>
      <h1>Your Giga Pet</h1>
    </header>

    <main>
      <section class="pet-image-container">
        <img class="pet-image" src="">
      </section>

      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>
          Health: <strong><span class="health"></span></strong>
        </div>
        <div class="bar">
          <div id="health-bar"></div>
        </div>
        <div>
          Happiness: <strong><span class="happiness"></span></strong>
        </div>
        <div class="bar">
          <div id="happiness-bar"></div>
        </div>
        <div>
          Hunger: <strong><span class="hunger"></span></strong>
        </div>
        <div class="bar">
          <div id="hunger-bar"></div>
        </div>

        <!-- Notification -->
        <!--<div id="pet-message"></div>-->

        <div class="button-container">
          <div class="buttons"></div>
          <button class="treat-button">Treat</button>
          <button class="play-button">Play</button>
          <button class="exercise-button">Exercise</button>
          <button class="sleep-button">Sleep</button> <!-- NEW BUTTON -->
        </div>

        <div id="pet-message"></div>
  </div>
  </section>
  </main>

  </div>

  <script src="https://code.jquery.com/jquery-2.2.1.min.js"></script>
  <script src="script.js"></script>

</body>

</html>
